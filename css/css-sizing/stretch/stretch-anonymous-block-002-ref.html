<!DOCTYPE html>
<meta charset="utf-8">
<title>CSS Reference Case</title>
<style>
  .container {
    writing-mode: vertical-rl;
    width: 100px;
    height: 200px;
  }
  iframe {
    writing-mode: horizontal-tb;
    box-sizing: border-box;
    height: 200px;
    width: 40px;
    border: 5px solid blue;
    margin: 0;
    background: cyan;
  }
</style>
<body>
  <div class="container">
    <div style="block-size: 0"></div>
    <iframe></iframe>
  </div>
</body>
