<!DOCTYPE html>
<meta charset="utf-8">
<title>CSS Test: 'stretch' on orthogonal child resolves through anonymous block wrapper</title>
<link rel="help" href="https://drafts.csswg.org/css-sizing-4/#sizing-values">
<link rel="match" href="stretch-anonymous-block-002-ref.html">
<meta name="assert"
      content="height:stretch on a child whose writing mode is orthogonal to its containing block resolves against the containing block's inline size, even when an anonymous block wrapper sits between (forced by mixed block+inline children).">
<style>
  .container {
    writing-mode: vertical-rl;
    width: 100px;
    height: 200px;
  }
  iframe {
    writing-mode: horizontal-tb;
    box-sizing: border-box;
    height: stretch;
    width: 40px;
    border: 5px solid blue;
    margin: 0;
    background: cyan;
  }
</style>
<body>
  <div class="container">
    <!-- The block-level <div> forces .container's children to be non-inline,
         wrapping the inline iframe in an anonymous block box. The iframe's
         writing mode is orthogonal to the anonymous wrapper (which inherits
         vertical-rl from .container), so the iframe's block size (height)
         resolves against the wrapper's inline size (= .container's height). -->
    <div style="block-size: 0"></div>
    <iframe></iframe>
  </div>
</body>
