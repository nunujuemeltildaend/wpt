name: Update Test262 tests

on:
  # Trigger at every Sunday UTC noon, or manually.
  schedule:
    - cron: '0 12 * * 0'
  workflow_dispatch:

jobs:
  update-test262:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout WPT repo
        uses: actions/checkout@v4
        with:
          path: wpt
      - name: Checkout Test262 repo
        uses: actions/checkout@v4
        with:
          repository: tc39/test262
          path: test262-spec
      - name: Copy Test262 tests to WPT and Create PR
        run: wpt/tools/ci/update-test262.sh --push $(pwd)/test262-spec
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
